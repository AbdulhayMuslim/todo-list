<!-- Add Note button -->
<button id="addNoteBtn">Add Note</button>

<!-- Notes container (wrap your existing notes here if you have any) -->
<div class="notes" id="notesContainer">
  <!-- existing .note elements can stay inside this -->
</div>

<!-- Add Note Popup -->
<div id="noteModal" class="modal">
  <div class="modal-content">
    <span id="closeModal" class="close">&times;</span>
    <h2>Add Note</h2>
    <textarea id="noteText" placeholder="Write your note..."></textarea>
    <button id="saveNoteBtn">Save</button>
  </div>
</div>

<!-- Font Awesome (if not already added) -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<!-- Your script (keep this last) -->
<script src="js/script.js"></script>
